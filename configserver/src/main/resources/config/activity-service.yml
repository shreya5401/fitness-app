spring:
    config:
        import: optional:file:.env[.properties]
    mongodb:
        uri: ${MONGODB_URI}

internal:
    api:
        secret: ${INTERNAL_API_SECRET}

server:
    port: 8082

eureka:
    instance:
        hostname: localhost
        instance-id: ${spring.application.name}:${server.port}
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/
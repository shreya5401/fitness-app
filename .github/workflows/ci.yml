name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # gateway and userservice depend on this, so it must be installed first
      - name: Build and install common module
        run: cd common && ./mvnw -B -q clean install -DskipTests

      - name: Build eureka
        run: cd eureka && ./mvnw -B -q clean package -DskipTests

      - name: Build configserver
        run: cd configserver && ./mvnw -B -q clean package -DskipTests

      - name: Build gateway
        run: cd gateway && ./mvnw -B -q clean package -DskipTests

      - name: Build userservice
        run: cd userservice && ./mvnw -B -q clean package -DskipTests

      - name: Build activityservice
        run: cd activityservice && ./mvnw -B -q clean package -DskipTests

      - name: Build aiservice
        run: cd aiservice && ./mvnw -B -q clean package -DskipTests

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-app-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fitness-app-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

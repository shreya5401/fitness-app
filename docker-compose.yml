name: fitness-app

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import
    ports:
      - "8181:8080"

  eureka:
    build:
      context: .
      dockerfile: eureka/Dockerfile
    ports:
      - "8761:8761"

  configserver:
    build:
      context: .
      dockerfile: configserver/Dockerfile
    depends_on:
      - eureka
    ports:
      - "8888:8888"

  userservice:
    build:
      context: .
      dockerfile: userservice/Dockerfile
    depends_on:
      - eureka
      - configserver
      - postgres
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: userservice
      POSTGRES_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-me}
    ports:
      - "8081:8081"

  activityservice:
    build:
      context: .
      dockerfile: activityservice/Dockerfile
    depends_on:
      - eureka
      - configserver
      - mongodb
      - userservice
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: activityservice
      MONGODB_URI: mongodb://mongodb:27017/activ
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-me}
    ports:
      - "8082:8082"

  aiservice:
    build:
      context: .
      dockerfile: aiservice/Dockerfile
    depends_on:
      - eureka
      - configserver
      - mongodb
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: aiservice
      MONGODB_URI: mongodb://mongodb:27017/fitnessrecommendation
      GEMINI_API_URL: ${GEMINI_API_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-me}
    ports:
      - "8083:8083"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      - eureka
      - configserver
      - keycloak
      - userservice
      - activityservice
      - aiservice
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: gateway
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/fitness-oauth2/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGIN: http://localhost:5173
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-me}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./fitness-app-frontend
      args:
        VITE_API_URL: http://localhost:8080/api
        VITE_KEYCLOAK_AUTH_ENDPOINT: http://localhost:8181/realms/fitness-oauth2/protocol/openid-connect/auth
        VITE_KEYCLOAK_TOKEN_ENDPOINT: http://localhost:8181/realms/fitness-oauth2/protocol/openid-connect/token
        VITE_KEYCLOAK_CLIENT_ID: oauth2-pkce-client
        VITE_REDIRECT_URI: http://localhost:5173
    depends_on:
      - gateway
    ports:
      - "5173:80"

volumes:
  mongo_data:
  postgres_data:
